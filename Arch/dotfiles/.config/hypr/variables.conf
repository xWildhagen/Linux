# |_______/ |_______| \______| \______/  | _| `._____/__/     \__\  |__|     |__|  \______/  |__| \__| 

# https://wiki.hypr.land/Configuring/Variables/#decoration

decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = $crust
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

